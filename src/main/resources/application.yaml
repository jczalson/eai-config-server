spring:
  application:
    name: config-server 
  cloud:
    config:
      server:
        git:
          uri: ${repository-url:https://gitlab.com/zalson/eai-config-files.git}
          cloneOnStart: true
          username: ${user}
          password: ${token}
          default-label: ${branch-name:main}

server:
  port: 8888   
   
management:
  endpoints:
    web:
      exposure:
        include: health, refresh, conditions