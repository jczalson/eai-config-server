spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://gitlab.com/zalson/eai-config-files.git
          cloneOnStart: true
          username: ${user}
          password: ${token}
          default-label: ${branch-name:main}

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    
server:
  port: 8888   
   
management:
  endpoints:
    web:
      exposure:
        include: health, refresh, conditions